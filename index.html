<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>1억 프로젝트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #f4f5fa;
    --card: #ffffff;
    --ink: #1a1d29;
    --ink-2: #6b7180;
    --ink-3: #9aa0b0;
    --line: #eceef4;
    --violet: #7b61ff;
    --violet-soft: #ece8ff;
    --amber: #ffb020;
    --amber-soft: #fff4dd;
    --green: #16c784;
    --green-soft: #e0f7ee;
    --red: #ff5b5b;
    --red-soft: #ffe8e8;
    --blue: #3e8bff;
    --blue-soft: #e5f0ff;
    --shadow: 0 2px 12px rgba(30,35,60,0.05);
    --shadow-lg: 0 8px 28px rgba(30,35,60,0.09);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    padding-bottom: calc(env(safe-area-inset-bottom) + 90px);
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 460px; margin: 0 auto; }

  /* 헤더 */
  .top {
    display: flex; align-items: center; gap: 12px;
    padding: calc(env(safe-area-inset-top) + 20px) 20px 14px;
  }
  .avatar {
    width: 42px; height: 42px; border-radius: 13px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--violet), #a78bff);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: 'Sora'; font-weight: 700; font-size: 18px;
  }
  .top-hi { font-size: 13px; color: var(--ink-2); }
  .top-name { font-family: 'Sora'; font-size: 16px; font-weight: 600; margin-top: 1px; }
  .top-bell {
    margin-left: auto; width: 40px; height: 40px; border-radius: 12px;
    background: var(--card); box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center; font-size: 17px;
  }

  /* 패널 */
  .panel { display: none; padding: 6px 20px 0; animation: rise 0.35s cubic-bezier(0.2,0.8,0.2,1); }
  .panel.on { display: block; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* 히어로 — 목표 카드 */
  .hero {
    background: linear-gradient(135deg, #7b61ff 0%, #9d7dff 100%);
    border-radius: 24px; padding: 22px; color: #fff;
    box-shadow: 0 12px 32px rgba(123,97,255,0.32);
    position: relative; overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute; right: -30px; top: -30px;
    width: 140px; height: 140px; border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .hero-label { font-size: 12.5px; opacity: 0.85; font-weight: 500; position: relative; }
  .hero-amt { font-family: 'Sora'; font-size: 34px; font-weight: 700; margin: 5px 0 3px; letter-spacing: -0.02em; position: relative; }
  .hero-sub { font-size: 12.5px; opacity: 0.8; position: relative; }
  .hero-gauge { margin-top: 18px; position: relative; }
  .hero-track { height: 8px; background: rgba(255,255,255,0.22); border-radius: 100px; overflow: hidden; }
  .hero-fill { height: 100%; background: #fff; border-radius: 100px; width: 0%; transition: width 1s cubic-bezier(0.2,0.8,0.2,1); }
  .hero-nums { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; }
  .hero-pct { font-weight: 700; }

  /* 스탯 2열 */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
  .mini {
    background: var(--card); border-radius: 18px; padding: 15px 16px;
    box-shadow: var(--shadow);
  }
  .mini-ic {
    width: 34px; height: 34px; border-radius: 10px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .mini-k { font-size: 12px; color: var(--ink-2); }
  .mini-v { font-family: 'Sora'; font-size: 17px; font-weight: 600; margin-top: 2px; letter-spacing: -0.01em; }

  /* 섹션 타이틀 */
  .sec {
    display: flex; align-items: center; justify-content: space-between;
    margin: 24px 2px 12px;
  }
  .sec-t { font-family: 'Sora'; font-size: 15px; font-weight: 600; }
  .sec-more { font-size: 12px; color: var(--violet); font-weight: 500; }

  /* 종목 리스트 */
  .list { background: var(--card); border-radius: 20px; box-shadow: var(--shadow); overflow: hidden; }
  .row { display: flex; align-items: center; padding: 15px 17px; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: none; }
  .row-ic {
    width: 40px; height: 40px; border-radius: 12px; margin-right: 13px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Sora'; font-weight: 700; font-size: 13px;
  }
  .row-main { flex: 1; min-width: 0; }
  .row-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .row-sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .row-right { text-align: right; }
  .row-v { font-family: 'Sora'; font-size: 14px; font-weight: 600; }
  .pill { font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .pill-isa { background: var(--violet-soft); color: var(--violet); }
  .pill-gen { background: var(--blue-soft); color: var(--blue); }

  /* 오늘의 매수 카드 */
  .buy-card {
    background: var(--card); border-radius: 20px; padding: 17px; margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .buy-top { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
  .buy-name { font-family: 'Sora'; font-size: 15px; font-weight: 600; }
  .buy-chg { margin-left: auto; font-size: 13px; font-weight: 600; padding: 3px 9px; border-radius: 8px; }
  .chg-up { background: var(--green-soft); color: var(--green); }
  .chg-down { background: var(--red-soft); color: var(--red); }
  .buy-signal { font-size: 12.5px; font-weight: 600; color: var(--amber); margin-bottom: 11px; }
  .buy-action {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--violet-soft); border-radius: 13px; padding: 13px 15px;
  }
  .buy-a-k { font-size: 12px; color: var(--violet); font-weight: 500; }
  .buy-a-v { font-family: 'Sora'; font-size: 17px; font-weight: 700; color: var(--violet); }
  .buy-detail { font-size: 11.5px; color: var(--ink-3); margin-top: 8px; padding-left: 2px; }

  /* Claude 코멘트 */
  .ai {
    background: linear-gradient(135deg, #fff4dd, #fffaf0);
    border: 1px solid #ffe4b3; border-radius: 18px; padding: 16px;
    margin-bottom: 12px;
  }
  .ai-top { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
  .ai-badge { font-size: 12px; font-weight: 700; color: #c8860a; }
  .ai-text { font-size: 13px; line-height: 1.6; color: #5c4a1f; }

  /* 입력 폼 */
  .form {
    background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .form-head { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
  .form-ic { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .form-t { font-family: 'Sora'; font-size: 15px; font-weight: 600; }
  .form-desc { font-size: 12px; color: var(--ink-2); margin: 8px 0 14px; line-height: 1.5; }
  .in-row { display: flex; gap: 9px; }
  .in {
    flex: 1; background: var(--bg); border: 1.5px solid var(--line); border-radius: 13px;
    padding: 13px 15px; font-size: 17px; font-weight: 600; font-family: 'Sora';
    color: var(--ink); outline: none; transition: border 0.18s; min-width: 0;
  }
  .in:focus { border-color: var(--violet); }
  .in::placeholder { color: var(--ink-3); font-weight: 400; font-family: 'Inter'; }
  .go {
    padding: 0 20px; border: none; border-radius: 13px; background: var(--violet);
    color: #fff; font-family: 'Sora'; font-size: 14px; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: opacity 0.18s;
  }
  .go:active { opacity: 0.7; }
  .go.amber { background: var(--amber); color: #5c4a1f; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 11px; }
  .chip {
    padding: 7px 13px; border: 1.5px solid var(--line); background: transparent;
    color: var(--ink-2); font-size: 12.5px; font-weight: 500; font-family: 'Inter';
    border-radius: 100px; cursor: pointer;
  }
  .chip:active { background: var(--bg); }

  .callout {
    background: var(--violet-soft); border-radius: 14px; padding: 14px 16px;
    font-size: 12px; color: #5847c4; line-height: 1.6; margin-bottom: 14px;
  }

  /* 거래 내역 */
  .tx { display: flex; align-items: center; padding: 14px 17px; border-bottom: 1px solid var(--line); }
  .tx:last-child { border-bottom: none; }
  .tx-ic { width: 38px; height: 38px; border-radius: 12px; margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .tx-main { flex: 1; }
  .tx-n { font-size: 14px; font-weight: 600; }
  .tx-d { font-size: 12px; color: var(--ink-3); margin-top: 1px; }
  .tx-a { font-family: 'Sora'; font-size: 14px; font-weight: 600; }

  /* 빈 상태 */
  .empty { text-align: center; padding: 44px 24px; color: var(--ink-3); font-size: 13.5px; line-height: 1.7; }
  .empty b { display: block; color: var(--ink-2); font-size: 14.5px; margin-bottom: 5px; font-family: 'Sora'; }
  .empty-ic { font-size: 32px; margin-bottom: 12px; }

  /* 하단 탭바 */
  .tabbar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 460px;
    background: var(--card); border-top: 1px solid var(--line);
    display: flex; padding: 8px 12px calc(env(safe-area-inset-bottom) + 8px);
    box-shadow: 0 -4px 20px rgba(30,35,60,0.05); z-index: 50;
  }
  .tab {
    flex: 1; border: none; background: transparent; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 0; color: var(--ink-3); font-family: 'Inter'; font-size: 10.5px; font-weight: 500;
    transition: color 0.18s;
  }
  .tab.on { color: var(--violet); }
  .tab-ic { font-size: 19px; }


  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .bt { flex: 1; padding: 11px; border: none; border-radius: 12px; font-family: 'Sora'; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: opacity 0.18s; }
  .bt:active { opacity: 0.7; }
  .bt-yes { background: var(--green); color: #fff; }
  .bt-no { background: var(--bg); color: var(--ink-2); border: 1.5px solid var(--line); }
  .done-tag { margin-top: 12px; text-align: center; padding: 10px; border-radius: 12px; background: var(--green-soft); color: var(--green); font-size: 13px; font-weight: 600; }

  /* 토스트 */
  .toast {
    position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%) translateY(140px);
    background: var(--ink); color: #fff; font-size: 13.5px; font-weight: 500;
    padding: 13px 20px; border-radius: 100px; z-index: 99; max-width: 88%;
    transition: transform 0.34s cubic-bezier(0.2,0.9,0.2,1); box-shadow: var(--shadow-lg);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="avatar" id="av">현</div>
    <div>
      <div class="top-hi">안녕하세요 👋</div>
      <div class="top-name" id="top-name">현민님</div>
    </div>
    <div class="top-bell">🔔</div>
  </div>

  <!-- 현황 -->
  <section class="panel on" id="p-home">
    <div class="hero">
      <div class="hero-label">총 자산</div>
      <div class="hero-amt" id="h-total">0원</div>
      <div class="hero-sub" id="h-remain">목표 1억까지 1억 남음</div>
      <div class="hero-gauge">
        <div class="hero-track"><div class="hero-fill" id="h-fill"></div></div>
        <div class="hero-nums"><span class="hero-pct" id="h-pct">0%</span><span>1억원</span></div>
      </div>
    </div>

    <div class="grid2">
      <div class="mini">
        <div class="mini-ic" style="background:var(--amber-soft)">💰</div>
        <div class="mini-k">예치금</div>
        <div class="mini-v" id="h-dep">0원</div>
      </div>
      <div class="mini">
        <div class="mini-ic" style="background:var(--blue-soft)">📥</div>
        <div class="mini-k">투자 원금</div>
        <div class="mini-v" id="h-inv">0원</div>
      </div>
      <div class="mini">
        <div class="mini-ic" style="background:var(--green-soft)">📈</div>
        <div class="mini-k">평가 손익</div>
        <div class="mini-v" id="h-pl">0원</div>
      </div>
      <div class="mini">
        <div class="mini-ic" style="background:var(--violet-soft)">📅</div>
        <div class="mini-k">경과</div>
        <div class="mini-v" id="h-mon">0개월</div>
      </div>
    </div>

    <div class="sec"><span class="sec-t">보유 종목</span></div>
    <div id="h-holdings"></div>
  </section>

  <!-- 오늘 -->
  <section class="panel" id="p-today">
    <div class="sec" style="margin-top:8px"><span class="sec-t">오늘의 매수 판단</span></div>
    <div id="t-body"></div>
  </section>

  <!-- 예산/예치금 -->
  <section class="panel" id="p-money">
    <div class="sec" style="margin-top:8px"><span class="sec-t">이번 달 예산 · 예치금</span></div>

    <!-- 이번 달 예산 -->
    <div class="form">
      <div class="form-head">
        <div class="form-ic" style="background:var(--violet-soft)">🎯</div>
        <div class="form-t">이번 달 투자 예산</div>
      </div>
      <div class="form-desc">이번 달에 실제로 투자할 금액이에요. 사정이 있어 적게 넣는 달엔 줄여서 입력하면, 매수량도 자동으로 그만큼 조절돼요.</div>
      <div class="in-row">
        <input class="in" type="number" id="b-input" placeholder="예: 2000000" inputmode="numeric">
        <button class="go" id="b-set">설정</button>
      </div>
      <div class="chips">
        <button class="chip" data-b="2000000">200만 (기본)</button>
        <button class="chip" data-b="1500000">150만</button>
        <button class="chip" data-b="1000000">100만</button>
        <button class="chip" data-b="500000">50만</button>
      </div>
    </div>

    <!-- 예치금 입금 -->
    <div class="form">
      <div class="form-head">
        <div class="form-ic" style="background:var(--amber-soft)">💰</div>
        <div class="form-t">예치금 입금</div>
      </div>
      <div class="form-desc">월급이나 매도 수익이 들어오면 여기에 추가하세요. 이 예치금 안에서 매일 매수가 이뤄져요.</div>
      <div class="in-row">
        <input class="in" type="number" id="d-input" placeholder="입금 금액" inputmode="numeric">
        <button class="go amber" id="d-add">추가</button>
      </div>
      <div class="chips">
        <button class="chip" data-d="2000000">200만</button>
        <button class="chip" data-d="1500000">150만</button>
        <button class="chip" data-d="1000000">100만</button>
      </div>
    </div>

    <div class="callout" id="money-status">현재 예치금 0원 · 이번 달 예산 200만원</div>

    <div class="sec"><span class="sec-t">입금 내역</span></div>
    <div id="d-history"></div>
  </section>

  <!-- 내역 -->
  <section class="panel" id="p-history">
    <div class="sec" style="margin-top:8px"><span class="sec-t">거래 내역</span></div>
    <div id="tx-body"></div>
  </section>

</div>

<!-- 탭바 -->
<nav class="tabbar">
  <button class="tab on" data-tab="home"><span class="tab-ic">🏠</span>현황</button>
  <button class="tab" data-tab="today"><span class="tab-ic">⚡</span>오늘</button>
  <button class="tab" data-tab="money"><span class="tab-ic">💳</span>예산</button>
  <button class="tab" data-tab="history"><span class="tab-ic">📋</span>내역</button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── 설정: 본인 GitHub 정보로 교체 ──
const GH_USER = 'KimHyeonMin2250';
const GH_REPO = 'invest-bot';
const GH_TOKEN = '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';
// ──────────────────────────────

const RAW_URL = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/portfolio.json`;
const API_URL = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/portfolio.json`;
const ICON_COLORS = [
  ['#ece8ff','#7b61ff'], ['#e0f7ee','#16c784'], ['#e5f0ff','#3e8bff'],
  ['#fff4dd','#ffb020'], ['#ffe8e8','#ff5b5b']
];

let P = {
  goal: 100000000, start_date: '2026-09-21',
  deposit: 0, total_invested: 0,
  base_monthly_total: 2000000, current_month_budget: 2000000,
  targets: {}, holdings: [], transactions: [], monthly_deposits: [],
  last_isa: null, last_general: null, action_log: []
};

const won = n => Math.round(n).toLocaleString('ko-KR') + '원';
const man = n => (n/10000).toLocaleString('ko-KR') + '만원';
const $ = id => document.getElementById(id);

async function load() {
  try { const c = localStorage.getItem('P'); if (c) P = { ...P, ...JSON.parse(c) }; } catch(e){}
  try {
    const r = await fetch(RAW_URL + '?t=' + Date.now());
    if (r.ok) { P = { ...P, ...await r.json() }; localStorage.setItem('P', JSON.stringify(P)); }
  } catch(e){ console.log('로컬 데이터 사용'); }
}

async function persist() {
  // 로컬에는 항상 저장
  localStorage.setItem('P', JSON.stringify(P));
}

async function triggerRecord(actionType, ticker, name, amount, market) {
  // GitHub Actions workflow_dispatch로 기록
  const REPO = `${GH_USER}/${GH_REPO}`;
  try {
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/record.yml/dispatches`,
      {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${GH_TOKEN}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          ref: 'main',
          inputs: {
            action_type: actionType,
            ticker: ticker,
            name: name,
            amount: String(amount),
            market: market
          }
        })
      }
    );
    if (res.status === 204) {
      toast('✅ 기록 중... (30초 후 반영)');
    } else {
      const err = await res.json();
      toast(`❌ 기록 실패: ${err.message}`);
    }
  } catch(e) {
    toast(`❌ 오류: ${e.message}`);
  }
}

function renderHome() {
  const dep = P.deposit||0;
  let hv = 0; (P.holdings||[]).forEach(h => hv += (h.invested||0));
  const total = dep + hv, inv = P.total_invested||0, pl = total - inv;
  const pct = Math.min(total/P.goal*100, 100);
  const start = new Date(P.start_date), now = new Date();
  const mon = Math.max(0, (now.getFullYear()-start.getFullYear())*12 + now.getMonth()-start.getMonth());

  $('h-total').textContent = won(total);
  $('h-remain').textContent = `목표 1억까지 ${man(Math.max(0,P.goal-total))} 남음`;
  $('h-fill').style.width = pct + '%';
  $('h-pct').textContent = pct.toFixed(1) + '%';
  $('h-dep').textContent = won(dep);
  $('h-inv').textContent = won(inv);
  $('h-mon').textContent = mon + '개월';
  const plEl = $('h-pl');
  plEl.textContent = (pl>=0?'+':'') + won(pl);
  plEl.style.color = pl>=0 ? 'var(--green)' : 'var(--red)';

  const box = $('h-holdings'), hs = P.holdings||[];
  if (!hs.length) { box.innerHTML = `<div class="list"><div class="empty"><div class="empty-ic">📊</div><b>아직 보유 종목이 없어요</b>예산을 설정하고 첫 매수를 시작해보세요</div></div>`; return; }
  box.innerHTML = '<div class="list">' + hs.map((h,i) => {
    const t = P.targets[h.ticker]||{};
    const [bg,fg] = ICON_COLORS[i%5];
    const acct = t.account==='ISA' ? '<span class="pill pill-isa">ISA</span>' : '<span class="pill pill-gen">일반</span>';
    const init = (h.name||h.ticker).replace(/[^A-Za-z가-힣]/g,'').slice(0,2);
    return `<div class="row">
      <div class="row-ic" style="background:${bg};color:${fg}">${init}</div>
      <div class="row-main"><div class="row-name">${h.name||h.ticker}</div><div class="row-sub">투자금 ${won(h.invested||0)}</div></div>
      <div class="row-right"><div class="row-v">${won(h.invested||0)}</div>${acct}</div>
    </div>`;
  }).join('') + '</div>';
}

function renderToday() {
  const box = $('t-body');
  const isa = P.last_isa, gen = P.last_general;
  if ((!isa || !isa.actions?.length) && (!gen || !gen.actions?.length)) {
    box.innerHTML = `<div class="list"><div class="empty"><div class="empty-ic">⚡</div><b>오늘의 판단을 기다리는 중</b>ISA는 낮 12시 30분<br>미국주식은 밤 11시 30분에 도착해요</div></div>`;
    return;
  }
  let html = '';
  [['isa', isa, '🇰🇷 ISA · 카카오페이', '국내장'], ['general', gen, '🇺🇸 일반계좌 · 토스', '미국장']].forEach(([key, a, label, mkt]) => {
    if (!a || !a.actions?.length) return;
    html += `<div class="sec" style="margin-top:18px"><span class="sec-t">${label}</span><span class="sec-more">${a.date}</span></div>`;
    if (a.dip_note) html += `<div class="ai" style="background:linear-gradient(135deg,#ffe8e8,#fff5f5);border-color:#ffc9c9"><div class="ai-top"><span>⚠️</span><span class="ai-badge" style="color:#c73939">급락 분석</span></div><div class="ai-text" style="color:#7a2e2e">${a.dip_note}</div></div>`;
    if (a.ai_comment) html += `<div class="ai"><div class="ai-top"><span>🤖</span><span class="ai-badge">Claude 코멘트</span></div><div class="ai-text">${a.ai_comment}</div></div>`;
    a.actions.filter(x => x.spent > 0).forEach((x, i) => {
      const up = x.change >= 0;
      const done = isDone(x.ticker, a.date);
      let amt, detail;
      if (x.account === 'general') {
        amt = `${won(x.spent)}어치`; detail = `약 ${x.shares}주 (소수점) · $${x.current}`;
      } else {
        amt = `${x.shares}주`; detail = `약 ${won(x.spent)} · ${won(x.current)}`;
      }
      html += `<div class="buy-card">
        <div class="buy-top"><span class="buy-name">${x.name}</span>
          <span class="buy-chg ${up?'chg-up':'chg-down'}">${up?'+':''}${x.change.toFixed(2)}%</span></div>
        ${x.signal ? `<div class="buy-signal">${x.signal}</div>` : ''}
        <div class="buy-action"><span class="buy-a-k">매수</span><span class="buy-a-v">${amt}</span></div>
        <div class="buy-detail">${detail}</div>
        ${done
          ? `<div class="done-tag">${done === 'bought' ? '✅ 매수 완료' : '⏭️ 건너뜀'}</div>`
          : `<div class="btn-row">
              <button class="bt bt-yes" onclick="mark('${x.ticker}','${a.date}','bought',${x.spent},'${x.name.replace(/'/g,"")}')">✅ 샀어요</button>
              <button class="bt bt-no" onclick="mark('${x.ticker}','${a.date}','skipped',0,'')">⏭️ 건너뜀</button>
            </div>`}
      </div>`;
    });
    const sk = a.actions.filter(x => x.spent === 0);
    if (sk.length) html += `<div class="callout">💡 예산 모으는 중: ${sk.map(s=>`${s.name} (${won(s.carry)})`).join(', ')}</div>`;
  });
  box.innerHTML = html;
}

function isDone(ticker, date) {
  const log = (P.action_log || []).find(l => l.ticker === ticker && l.date === date);
  return log ? log.status : null;
}

async function mark(ticker, date, status, spent, name) {
  // 로컬 기록
  P.action_log = P.action_log || [];
  P.action_log = P.action_log.filter(l => !(l.ticker === ticker && l.date === date));
  P.action_log.unshift({ ticker, date, status });

  if (status === 'bought' && spent > 0) {
    P.deposit = Math.max(0, (P.deposit || 0) - spent);
    P.holdings = P.holdings || [];
    const ex = P.holdings.find(x => x.ticker === ticker);
    if (ex) ex.invested = (ex.invested || 0) + spent;
    else P.holdings.push({ ticker, name, invested: spent });
    P.transactions = P.transactions || [];
    P.transactions.unshift({ type:'buy', ticker, name, amount: spent, date });
  }

  // 로컬 저장
  await persist();
  renderAll();

  // GitHub Actions 트리거 (GitHub에 영구 저장)
  const market = (P.targets[ticker] || {}).account === 'ISA' ? 'isa' : 'general';
  await triggerRecord(status, ticker, name, spent, market);
}

function renderMoney() {
  $('money-status').textContent = `현재 예치금 ${won(P.deposit||0)} · 이번 달 예산 ${man(P.current_month_budget||2000000)}`;
  const hist = P.monthly_deposits||[], box = $('d-history');
  if (!hist.length) { box.innerHTML = `<div class="list"><div class="empty">입금 내역이 없어요</div></div>`; return; }
  box.innerHTML = '<div class="list">' + hist.slice(0,20).map(d =>
    `<div class="tx"><div class="tx-ic" style="background:var(--amber-soft)">💰</div>
      <div class="tx-main"><div class="tx-n">예치금 입금</div><div class="tx-d">${d.date}</div></div>
      <div class="tx-a" style="color:var(--amber)">+${won(d.amount)}</div></div>`
  ).join('') + '</div>';
}

function renderHistory() {
  const txs = P.transactions||[], box = $('tx-body');
  if (!txs.length) { box.innerHTML = `<div class="list"><div class="empty"><div class="empty-ic">📋</div><b>거래 내역이 없어요</b>매수·입금 기록이 여기 쌓여요</div></div>`; return; }
  box.innerHTML = '<div class="list">' + txs.slice(0,60).map(t => {
    const dep = t.type==='deposit', buy = t.type==='buy';
    const bg = dep?'var(--amber-soft)':buy?'var(--green-soft)':'var(--red-soft)';
    const sym = dep?'💰':buy?'📈':'📉';
    const nm = dep?'예치금 입금':`${t.name||t.ticker} ${buy?'매수':'매도'}`;
    const col = dep?'var(--amber)':buy?'var(--green)':'var(--red)';
    const amt = t.amount ? ((buy||dep?'+':'-')+won(t.amount)) : '-';
    return `<div class="tx"><div class="tx-ic" style="background:${bg}">${sym}</div>
      <div class="tx-main"><div class="tx-n">${nm}</div><div class="tx-d">${t.date}</div></div>
      <div class="tx-a" style="color:${col}">${amt}</div></div>`;
  }).join('') + '</div>';
}

function renderAll() { renderHome(); renderToday(); renderMoney(); renderHistory(); }

async function setBudget(v) {
  if (!v || v <= 0) { toast('금액을 입력해주세요'); return; }
  P.current_month_budget = v;
  await persist(); renderAll();
  toast(`이번 달 예산 ${man(v)}으로 설정`);
}

async function addDeposit(v) {
  if (!v || v <= 0) { toast('금액을 입력해주세요'); return; }
  P.deposit = (P.deposit||0) + v;
  P.total_invested = (P.total_invested||0) + v;
  P.monthly_deposits = P.monthly_deposits||[];
  P.monthly_deposits.unshift({ amount:v, date:new Date().toISOString().slice(0,10) });
  P.transactions = P.transactions||[];
  P.transactions.unshift({ type:'deposit', amount:v, date:new Date().toISOString().slice(0,10) });
  await persist(); renderAll();
  toast(`${won(v)} 추가됨`);
}

let tt;
function toast(m) { const t = $('toast'); t.textContent = m; t.classList.add('show'); clearTimeout(tt); tt = setTimeout(()=>t.classList.remove('show'), 2500); }

document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  b.classList.add('on'); $('p-'+b.dataset.tab).classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}));

$('b-set').addEventListener('click', () => { const v = parseInt($('b-input').value||'0'); $('b-input').value=''; setBudget(v); });
$('d-add').addEventListener('click', () => { const v = parseInt($('d-input').value||'0'); $('d-input').value=''; addDeposit(v); });
document.querySelectorAll('[data-b]').forEach(c => c.addEventListener('click', ()=> $('b-input').value = c.dataset.b));
document.querySelectorAll('[data-d]').forEach(c => c.addEventListener('click', ()=> $('d-input').value = c.dataset.d));

(async () => { await load(); renderAll(); })();
</script>
</body>
</html>
