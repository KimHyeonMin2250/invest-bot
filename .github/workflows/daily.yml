name: Daily Dip-Buy Analysis

on:
  schedule:
    - cron: '30 14 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run daily analysis
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python analyze.py

      - name: Save updated portfolio
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Investment Bot"
          git add portfolio.json
          git diff --staged --quiet || git commit -m "update"
          git push
